name: ansorum
version: 0.2.0-alpha
title: Ansorum
summary: An answer-first compiler for agent-readable and human-readable knowledge.
description: |
  An answer-first compiler for agent-readable and human-readable knowledge.
website: https://ansorum.com

base: core22
grade: devel  # alpha builds should not ship as stable
confinement: strict  # use 'strict' once you have the right plugs and slots

parts:
  ansorum:
    plugin: rust
    rust-channel: stable
    source: .
    build-packages:
      - build-essential
      - cmake
      - pkg-config
      - libssl-dev

apps:
  ansorum:
    command: bin/ansorum
    plugs:
      - home
      - network
      - network-bind
      
