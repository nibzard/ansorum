name: Build & Test

on:
  push:
    branches: ["*"]
  pull_request:

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-msvc
          - x86_64-apple-darwin
          - aarch64-apple-darwin
        rustup_toolchain: [stable]
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rustup_toolchain }}

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo build (Native TLS)
        run: |
          cargo build --all --no-default-features --features=native-tls
          cargo clean

      - name: Cargo build (Rust TLS)
        run: cargo build --all

      - name: Cargo test
        run: cargo test --all

  Governed-Answer-Contract:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build ansorum
        run: cargo build --locked

      - name: Run workspace tests
        run: cargo test --locked --all

      - name: Build reference answer corpus
        run: ./target/debug/ansorum --root examples/reference-project build

      - name: Audit compiler contract
        run: ./target/debug/ansorum --root examples/reference-project audit --format json

      - name: Evaluate compiler contract
        run: ./target/debug/ansorum --root examples/reference-project eval --format json --min-pass-rate 1.0
